<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="atom-gradient" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square border -->
  <rect x="12" y="12" width="104" height="104" rx="20" ry="20" fill="none" stroke="url(#atom-gradient)" stroke-width="2.5"/>
  
  <!-- Outer electron orbits -->
  <g fill="none" stroke="url(#atom-gradient)" stroke-width="1.8" opacity="0.7">
    <!-- First orbit (horizontal) -->
    <ellipse cx="64" cy="64" rx="30" ry="14"/>
    
    <!-- Second orbit (rotated 60°) -->
    <g transform="translate(64, 64) rotate(60) translate(-64, -64)">
      <ellipse cx="64" cy="64" rx="30" ry="14"/>
    </g>
    
    <!-- Third orbit (rotated 120°) -->
    <g transform="translate(64, 64) rotate(120) translate(-64, -64)">
      <ellipse cx="64" cy="64" rx="30" ry="14"/>
    </g>
  </g>
  
  <!-- Center nucleus -->
  <circle cx="64" cy="64" r="5.5" fill="url(#atom-gradient)"/>
  
  <!-- Electron dots on orbits -->
  <g fill="url(#atom-gradient)">
    <!-- Electrons on first orbit -->
    <circle cx="94" cy="64" r="3"/>
    <circle cx="34" cy="64" r="3"/>
    
    <!-- Electrons on second orbit (60° rotation) -->
    <circle cx="48.5" cy="38" r="3"/>
    <circle cx="79.5" cy="90" r="3"/>
    
    <!-- Electrons on third orbit (120° rotation) -->
    <circle cx="79.5" cy="38" r="3"/>
    <circle cx="48.5" cy="90" r="3"/>
  </g>
</svg>
